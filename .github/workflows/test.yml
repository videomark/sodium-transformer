name: test
on: push
jobs:
  main:
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo@sha256:7abfba0d07c9330373f8173981ea4d09cd8a82cdf0e86ccaf7008848d1d24f62
        ports: ["27017:27017"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: "npm"
      - run: npm ci
      - run: npm test
